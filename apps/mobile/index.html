<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#eef2f7" />
    <title>Monoscape Mobile</title>
    <style>
      #mn-splash {
        position: fixed;
        inset: 0;
        z-index: 99999;
        background: #eef2f7;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        transition: opacity 0.4s ease;
      }
      #mn-splash.mn-splash--out {
        opacity: 0;
        pointer-events: none;
      }
      .mn-splash__wordmark {
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 1.7rem;
        font-weight: 700;
        letter-spacing: -0.03em;
        color: #172033;
      }
      .mn-splash__dots {
        display: flex;
        gap: 7px;
      }
      .mn-splash__dots span {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #005fcc;
        opacity: 0.3;
        animation: mn-pulse 1.2s ease-in-out infinite;
      }
      .mn-splash__dots span:nth-child(2) { animation-delay: 0.2s; }
      .mn-splash__dots span:nth-child(3) { animation-delay: 0.4s; }
      @keyframes mn-pulse {
        0%, 100% { opacity: 0.3; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.3); }
      }
    </style>
  </head>
  <body>
    <div id="mn-splash" aria-hidden="true">
      <span class="mn-splash__wordmark">Monoscape</span>
      <div class="mn-splash__dots"><span></span><span></span><span></span></div>
    </div>
    <script>
      window.__hideSplash = function () {
        var el = document.getElementById('mn-splash');
        if (!el) return;
        el.classList.add('mn-splash--out');
        setTimeout(function () { if (el.parentNode) el.parentNode.removeChild(el); }, 500);
      };
    </script>
    <div id="app"></div>
    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
